<body class="body  h-100">
	<div class="authincation d-flex flex-column flex-lg-row flex-column-fluid">
		<div class="login-aside text-center  d-flex flex-column flex-row-auto">
			<div class="d-flex flex-column-auto flex-column pt-lg-40 pt-15">
				<div class="text-center mb-lg-4 mb-2 pt-5 logo">
					<img src="images/logo-white.png" alt="">
				</div>
				<h3 class="mb-2 text-white">회원가입</h3>
				<p class="mb-4">부스트클래스 관리자 계정 만들기</p>
			</div>
			<div class="aside-image position-relative" style="background-image:url(images/background/pic-2.png);">
				<img class="img1 move-1" src="images/background/pic3.png" alt="">
				<img class="img2 move-2" src="images/background/pic4.png" alt="">
				<img class="img3 move-3" src="images/background/pic5.png" alt="">
				
			</div>
		</div>
		<div class="container flex-row-fluid d-flex flex-column justify-content-center position-relative overflow-hidden p-7 mx-auto">
			<div class="d-flex justify-content-center h-100 align-items-center">
				<div class="authincation-content style-2">
					<div class="row no-gutters">
						<div class="col-xl-12 tab-content">
							<div id="sign-up" class="auth-form tab-pane fade show active">
								<form id="registerForm" novalidate>
									<div class="text-center mb-4">
										<h3 class="text-center mb-2 text-black">회원가입</h3>
										<span>이메일로 새 계정 만들기</span>
									</div>
									<div id="registerError" class="alert alert-danger d-none mb-3" role="alert"></div>
									<div class="row mb-4">
										<div class="col-12">
											<button type="button" id="btnGoogleSignup" class="btn btn-outline-light d-block social-bx w-100">
											<svg width="16" height="16" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
											<path d="M27.9851 14.2618C27.9851 13.1146 27.8899 12.2775 27.6837 11.4094H14.2788V16.5871H22.1472C21.9886 17.8738 21.132 19.8116 19.2283 21.1137L19.2016 21.287L23.44 24.4956L23.7336 24.5242C26.4304 22.0904 27.9851 18.5093 27.9851 14.2618Z" fill="#4285F4"/>
											<path d="M14.279 27.904C18.1338 27.904 21.37 26.6637 23.7338 24.5245L19.2285 21.114C18.0228 21.9356 16.4047 22.5092 14.279 22.5092C10.5034 22.5092 7.29894 20.0754 6.15663 16.7114L5.9892 16.7253L1.58205 20.0583L1.52441 20.2149C3.87224 24.7725 8.69486 27.904 14.279 27.904Z" fill="#34A853"/>
											<path d="M6.15656 16.7113C5.85516 15.8432 5.68072 14.913 5.68072 13.9519C5.68072 12.9907 5.85516 12.0606 6.14071 11.1925L6.13272 11.0076L1.67035 7.62109L1.52435 7.68896C0.556704 9.58024 0.00146484 11.7041 0.00146484 13.9519C0.00146484 16.1997 0.556704 18.3234 1.52435 20.2147L6.15656 16.7113Z" fill="#FBBC05"/>
											<path d="M14.279 5.3947C16.9599 5.3947 18.7683 6.52635 19.7995 7.47204L23.8289 3.6275C21.3542 1.37969 18.1338 0 14.279 0C8.69485 0 3.87223 3.1314 1.52441 7.68899L6.14077 11.1925C7.29893 7.82856 10.5034 5.3947 14.279 5.3947Z" fill="#EB4335"/>
											</svg>
											<span class="ms-1 font-w600 label-color">Google로 회원가입</span></button>
										</div>
									</div>
									<div class="sepertor">
										<span class="d-block mb-4 fs-13">이메일로 회원가입</span>
									</div>
									<div class="mb-3">
										<label for="registerDisplayName" class="form-label mb-2 fs-13 label-color font-w500">이름 (선택)</label>
										<input type="text" class="form-control" id="registerDisplayName" placeholder="홍길동" autocomplete="name">
									</div>
									<div class="mb-3">
										<label for="registerEmail" class="form-label mb-2 fs-13 label-color font-w500">이메일<span class="text-danger">*</span></label>
										<input type="email" class="form-control" id="registerEmail" placeholder="example@email.com" required autocomplete="email">
									</div>
									<div class="mb-3">
										<label for="registerPassword" class="form-label mb-2 fs-13 label-color font-w500">비밀번호<span class="text-danger">*</span></label>
										<input type="password" class="form-control" id="registerPassword" placeholder="6자 이상" required autocomplete="new-password" minlength="6">
									</div>
									<div class="mb-3">
										<label for="registerPasswordConfirm" class="form-label mb-2 fs-13 label-color font-w500">비밀번호 확인<span class="text-danger">*</span></label>
										<input type="password" class="form-control" id="registerPasswordConfirm" placeholder="비밀번호 다시 입력" required autocomplete="new-password" minlength="6">
									</div>
									<button type="submit" class="btn btn-block btn-primary" id="btnRegisterSubmit">회원가입</button>
								</form>
								<div class="new-account mt-3 text-center">
									<p class="font-w500">이미 계정이 있으신가요? <a class="text-primary" href="page-login.html">로그인</a></p>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


    <!-- Firebase SDK (회원가입 시 Firebase Auth에 저장됨) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
(function() {
  var config = {
    apiKey: "AIzaSyCijM7nOf7xYPKevbOsRrrZTA6XwgODeIM",
    authDomain: "boostclass-7d4fd.firebaseapp.com",
    projectId: "boostclass-7d4fd",
    storageBucket: "boostclass-7d4fd.firebasestorage.app",
    messagingSenderId: "774803491487",
    appId: "1:774803491487:web:daada5b95008a14c2730aa"
  };
  if (typeof firebase === 'undefined') {
    var errEl = document.getElementById('registerError');
    if (errEl) { errEl.textContent = 'Firebase를 불러올 수 없습니다. 인터넷 연결을 확인해 주세요.'; errEl.classList.remove('d-none'); }
    return;
  }
  firebase.initializeApp(config);
  var auth = firebase.auth();

  function errMsg(code) {
    var map = { 'auth/email-already-in-use':'이미 사용 중인 이메일입니다.', 'auth/invalid-email':'올바른 이메일이 아닙니다.', 'auth/weak-password':'비밀번호는 6자 이상이어야 합니다.', 'auth/popup-closed-by-user':'창이 닫혔습니다.', 'auth/popup-blocked':'팝업을 허용해 주세요.', 'auth/operation-not-allowed':'이 로그인 방식이 비활성화되어 있습니다.' };
    return map[code] || (code || '오류가 발생했습니다.');
  }

  window.doRegister = function() {
    var nameEl = document.getElementById('registerDisplayName');
    var emailEl = document.getElementById('registerEmail');
    var pwEl = document.getElementById('registerPassword');
    var pw2El = document.getElementById('registerPasswordConfirm');
    var errEl = document.getElementById('registerError');
    var btn = document.getElementById('btnRegisterSubmit');
    if (!emailEl || !pwEl || !errEl || !btn) return;
    var email = (emailEl.value || '').trim();
    var password = pwEl.value || '';
    var password2 = (pw2El && pw2El.value) || '';
    var displayName = (nameEl && nameEl.value) ? nameEl.value.trim() : '';
    errEl.classList.add('d-none');
    if (!email || !password) { errEl.textContent = '이메일과 비밀번호를 입력해 주세요.'; errEl.classList.remove('d-none'); return; }
    if (password.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 합니다.'; errEl.classList.remove('d-none'); return; }
    if (password !== password2) { errEl.textContent = '비밀번호가 일치하지 않습니다.'; errEl.classList.remove('d-none'); return; }
    btn.disabled = true;
    btn.textContent = '가입 중…';
    auth.createUserWithEmailAndPassword(email, password)
      .then(function(cred) {
        if (displayName && cred.user) return cred.user.updateProfile({ displayName: displayName }).then(function() { return cred; });
        return cred;
      })
      .then(function() { window.location.href = 'index.html'; })
      .catch(function(e) { errEl.textContent = errMsg(e.code); errEl.classList.remove('d-none'); })
      .finally(function() { btn.disabled = false; btn.textContent = '회원가입'; });
  };

  window.doGoogleSignup = function() {
    var errEl = document.getElementById('registerError');
    var btn = document.getElementById('btnRegisterSubmit');
    if (errEl) errEl.classList.add('d-none');
    if (btn) { btn.disabled = true; btn.textContent = '가입 중…'; }
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .then(function() { window.location.href = 'index.html'; })
      .catch(function(e) {
        if (errEl) { errEl.textContent = errMsg(e.code); errEl.classList.remove('d-none'); }
      })
      .finally(function() { if (btn) { btn.disabled = false; btn.textContent = '회원가입'; } });
  };

  function init() {
    auth.onAuthStateChanged(function(user) { if (user) window.location.href = 'index.html'; });
    var form = document.getElementById('registerForm');
    var btn = document.getElementById('btnRegisterSubmit');
    var googleBtn = document.getElementById('btnGoogleSignup');
    if (form) form.addEventListener('submit', function(e) { e.preventDefault(); window.doRegister(); });
    if (btn) btn.addEventListener('click', window.doRegister);
    if (googleBtn) googleBtn.addEventListener('click', window.doGoogleSignup);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else setTimeout(init, 0);
})();
    </script>
</body>
