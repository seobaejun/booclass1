<body class="body  h-100">
	<div class="authincation d-flex flex-column flex-lg-row flex-column-fluid">
		<div class="login-aside text-center  d-flex flex-column flex-row-auto">
			<div class="d-flex flex-column-auto flex-column pt-lg-40 pt-15">
				<div class="text-center mb-lg-4 mb-2 pt-5 logo">
					<img src="../../image/logo.png" alt="부스트클래스" class="img-fluid" style="max-width: 200px; border-radius: 12px;">
				</div>
				<h3 class="mb-2 text-white">다시 오신 것을 환영합니다!</h3>
				<p class="mb-4 text-white">부스트클래스 관리자 페이지입니다.<br>비밀번호를 입력하여 잠금을 해제하세요.</p>
			</div>
			<div class="aside-image position-relative" style="background-image:url(images/background/pic-2.png);">
				<img class="img1 move-1" src="images/background/pic3.png" alt="">
				<img class="img2 move-2" src="images/background/pic4.png" alt="">
				<img class="img3 move-3" src="images/background/pic5.png" alt="">
				
			</div>
		</div>
		<div class="container flex-row-fluid d-flex flex-column justify-content-center position-relative overflow-hidden p-7 mx-auto">
			<div class="d-flex justify-content-center h-100 align-items-center">
				<div class="authincation-content style-2">
					<div class="row no-gutters">
						<div class="col-xl-12 tab-content">
							<div id="sign-up" class="auth-form tab-pane fade show active  form-validation">
								<form id="lockForm" method="get" action="javascript:void(0);">
									<div class="text-center mb-4">
										<h3 class="text-center mb-2 text-black">관리자 잠금 화면</h3>
										<span>비밀번호를 입력하세요.</span>
									</div>
									<div class="mb-3">
										<label for="lockPassword" class="form-label mb-2 fs-13 label-color font-w500">비밀번호</label>
										<input type="password" class="form-control" id="lockPassword" name="password" placeholder="비밀번호 입력" autocomplete="off">
									</div>
									<p id="lockError" class="text-danger small mb-2 d-none">비밀번호가 올바르지 않습니다.</p>
									<button type="submit" class="btn btn-block btn-primary">잠금 해제</button>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


    <!--**********************************
        Scripts
    ***********************************-->
    <script>
(function() {
  var ADMIN_LOCK_PASSWORD = '@skybj6942';
  var STORAGE_KEY = 'adminUnlocked';
  var form = document.getElementById('lockForm');
  var input = document.getElementById('lockPassword');
  var errorEl = document.getElementById('lockError');
  if (!form || !input) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (errorEl) errorEl.classList.add('d-none');
    if (input.value === ADMIN_LOCK_PASSWORD) {
      try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch (err) {}
      window.location.href = 'index.html';
    } else {
      if (errorEl) errorEl.classList.remove('d-none');
      input.focus();
    }
  });
})();
    </script>
