<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
    <title>비밀번호 찾기 - 부스트클래스</title>
    <style>
        .auth-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; margin-top: 80px; }
        .auth-card { max-width: 420px; width: 100%; }
        .auth-card .form-control { padding: 0.75rem 1rem; }
    </style>
</head>
<body>
    <div id="header" class="fixed-top bg-accent-transparent glass-effect py-0" style="z-index: 9999;">
        <nav class="navbar navbar-expand-xl">
            <div class="r-container w-100 px-3 px-xl-5 d-flex align-items-center justify-content-end">
                <a href="index.html" class="btn btn-accent">홈으로</a>
            </div>
        </nav>
    </div>

    <section class="auth-section">
        <div class="auth-card">
            <h2 class="text-center mb-2">비밀번호 찾기</h2>
            <p class="text-center text-white-50 mb-4">가입 시 사용한 이메일을 입력하시면 재설정 메일을 보내드립니다.</p>
            <div id="forgotError" class="alert alert-danger d-none mb-3" role="alert"></div>
            <div id="forgotSuccess" class="alert alert-success d-none mb-3" role="alert"></div>
            <form id="forgotForm" novalidate>
                <div class="mb-3">
                    <label for="forgotEmail" class="form-label">아이디(이메일)</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="forgotEmail" placeholder="이메일을 입력하세요" required autocomplete="username">
                </div>
                <button type="submit" class="btn btn-accent w-100 py-3 mb-3" id="btnForgotSubmit">재설정 메일 보내기</button>
            </form>
            <p class="text-center mt-3 text-white-50"><a href="login.html" class="text-accent">로그인</a></p>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
(function() {
  var config = {
    apiKey: "AIzaSyCijM7nOf7xYPKevbOsRrrZTA6XwgODeIM",
    authDomain: "boostclass-7d4fd.firebaseapp.com",
    projectId: "boostclass-7d4fd",
    storageBucket: "boostclass-7d4fd.firebasestorage.app",
    messagingSenderId: "774803491487",
    appId: "1:774803491487:web:daada5b95008a14c2730aa"
  };
  if (typeof firebase === 'undefined') {
    var errEl = document.getElementById('forgotError');
    if (errEl) { errEl.textContent = 'Firebase를 불러올 수 없습니다.'; errEl.classList.remove('d-none'); }
    return;
  }
  firebase.initializeApp(config);
  var auth = firebase.auth();
  function errMsg(code) {
    var map = {
      'auth/invalid-email': '올바른 이메일이 아닙니다.',
      'auth/user-not-found': '등록되지 않은 이메일입니다.',
      'auth/too-many-requests': '요청이 많습니다. 잠시 후 다시 시도해 주세요.'
    };
    return map[code] || (code || '오류가 발생했습니다.');
  }
  window.doForgotPassword = function() {
    var emailEl = document.getElementById('forgotEmail');
    var errEl = document.getElementById('forgotError');
    var successEl = document.getElementById('forgotSuccess');
    var btn = document.getElementById('btnForgotSubmit');
    if (!emailEl || !errEl || !btn) return;
    var email = (emailEl.value || '').trim();
    errEl.classList.add('d-none');
    successEl.classList.add('d-none');
    if (!email) {
      errEl.textContent = '이메일을 입력해 주세요.';
      errEl.classList.remove('d-none');
      return;
    }
    btn.disabled = true;
    btn.textContent = '전송 중…';
    auth.sendPasswordResetEmail(email)
      .then(function() {
        successEl.textContent = '비밀번호 재설정 메일을 보냈습니다. 이메일을 확인해 주세요.';
        successEl.classList.remove('d-none');
      })
      .catch(function(e) {
        errEl.textContent = errMsg(e.code);
        errEl.classList.remove('d-none');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = '재설정 메일 보내기';
      });
  };
  function init() {
    var form = document.getElementById('forgotForm');
    var btn = document.getElementById('btnForgotSubmit');
    if (form) form.addEventListener('submit', function(e) { e.preventDefault(); window.doForgotPassword(); });
    if (btn) btn.addEventListener('click', window.doForgotPassword);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else setTimeout(init, 0);
})();
    </script>
</body>
</html>
